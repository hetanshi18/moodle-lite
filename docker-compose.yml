services:
  postgres:
    image: postgres:15-alpine
    container_name: moodlite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: moodlite
      POSTGRES_PASSWORD: moodlite_pass
      POSTGRES_DB: moodlite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodlite"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moodlite-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: development
      SECRET_KEY: local-dev-secret-change-me
      DATABASE_URL: postgresql://moodlite:moodlite_pass@postgres:5432/moodlite
      UPLOAD_FOLDER: /home/moodlite/uploads
    volumes:
      - uploads_data:/home/moodlite/uploads
      - .:/home/moodlite/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["gunicorn","--bind","0.0.0.0:5000","--workers","2","--threads","4","--timeout","120","--access-logfile","-","--error-logfile","-","wsgi:app"]

volumes:
  postgres_data:
  uploads_data: