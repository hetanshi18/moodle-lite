{% extends "base.html" %}
{% block title %}Create Assignment{% endblock %}
{% block content %}
<div class="container" style="max-width:640px;">
  <div class="page-header">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-1" style="font-size:0.82rem;">
        <li class="breadcrumb-item"><a href="{{ url_for('courses.dashboard') }}">My Courses</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('courses.view_course', course_id=course.id) }}">{{ course.name }}</a></li>
        <li class="breadcrumb-item active">New Assignment</li>
      </ol>
    </nav>
    <h2><i class="bi bi-pencil-square me-2 text-primary"></i>Create Assignment</h2>
  </div>

  <div class="ml-card p-4">
    <form method="POST" action="{{ url_for('assignments.create', course_id=course.id) }}">
      <div class="mb-3">
        <label class="form-label" for="title">Assignment Title <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="title" name="title"
          placeholder="e.g. Lab 1 – Deploy a Containerised App" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="description">Description / Instructions</label>
        <textarea class="form-control" id="description" name="description" rows="4"
          placeholder="Describe the task, requirements, and submission format..."></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label" for="due_date">Due Date & Time</label>
        <input type="datetime-local" class="form-control" id="due_date" name="due_date" />
      </div>
      <div class="d-flex justify-content-between pt-2 border-top" style="border-color:var(--ml-border) !important;">
        <a href="{{ url_for('courses.view_course', course_id=course.id) }}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-2"></i>Create Assignment
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
