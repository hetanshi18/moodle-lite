{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card fade-in-up">
    <div class="auth-logo"><i class="bi bi-mortarboard-fill"></i></div>
    <h2 class="text-center fw-800 mb-1" style="font-size:1.6rem;">Welcome back</h2>
    <p class="text-center text-muted mb-4" style="font-size:0.9rem;">Sign in to continue to MoodLite</p>

    <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
      <div class="mb-3">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.04);border-color:var(--ml-border);">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required autofocus />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:rgba(255,255,255,0.04);border-color:var(--ml-border);">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required />
          <button type="button" class="btn btn-outline-secondary border-0 px-3" id="toggle-pw" title="Toggle password" style="background:rgba(255,255,255,0.04);border-color:var(--ml-border) !important;">
            <i class="bi bi-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="remember" name="remember" />
          <label class="form-check-label text-muted" style="font-size:0.85rem;" for="remember">Remember me</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:0.88rem;">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="fw-600">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('pw-icon');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
});
</script>
{% endblock %}
