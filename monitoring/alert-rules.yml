groups:
  - name: moodlite-alerts
    interval: 30s
    rules:
      - alert: ApplicationDown
        expr: up{job="moodlite-metrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MoodLite application is down"
          description: "MoodLite application has been unreachable for 2 minutes"

      - alert: HighCPUUsage
        expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: DiskSpaceRunningOut
        expr: (node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running out on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} disk space available"

      - alert: HighLoadAverage
        expr: node_load5 > (count(node_cpu_seconds_total{mode="system"}) by (instance) * 2)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "Load average is {{ $value }}"
